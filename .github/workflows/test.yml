name: Run Tests

on:
  push:
    branches: [ main, dev ]      # you don't use 'trunk'
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'            # add caching, speeds up CI

      - name: Install dependencies
        run: npm install          # use install instead of ci to avoid lock file sync errors

      - name: Run tests
        run: npm test -- --watchAll=false --ci