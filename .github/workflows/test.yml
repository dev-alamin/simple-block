name: Run Tests

on: 
    push:
        branches: [main, dev]
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/setup-node@v4
        
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'

        - name: Install dependencies
          uses: npm ci

        - name: Run tests
          run: npm test -- --watchAll=false --ci